groovyScriptTitle=Groovy \u811a\u672c
groovyScriptDescription=\u6784\u5efa\u524d\u6267\u884c\u7684 Groovy \u811a\u672c\u3002\u7ed1\u5b9a\u53d8\u91cf: job, jenkins, env, params\u3002\u6784\u5efa\u53c2\u6570\u53ef\u4f5c\u4e3a\u53d8\u91cf\u76f4\u63a5\u4f7f\u7528(\u5982 DEPLOY_ENV)\uff0c\u4e5f\u53ef\u901a\u8fc7 params \u6620\u5c04\u8bbf\u95ee(params.get('DEPLOY_ENV'))\u3002\u5FC5\u987B\u8FD4\u56DE Map \u683C\u5F0F: return [blockBuild: true, showPopup: true, popupContent: '\u6D88\u606F', popupTitle: '\u6807\u9898']\u3002\u952E\u540D: blockBuild (Boolean, \u9ED8\u8BA4false), showPopup (Boolean, \u9ED8\u8BA4false), popupContent (String), popupTitle (String, \u9ED8\u8BA4'Build Notification')\u3002\u4F7F\u7528 Map \u5B57\u9762\u91CF [key: value]\uFF0C\u4E0D\u662F\u65B9\u6CD5\u8C03\u7528\u3002

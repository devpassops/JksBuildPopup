enabledTitle=Enable Build Popup Check
groovyScriptTitle=Groovy Script
groovyScriptDescription=Groovy script to execute before build. Available bindings: job, jenkins, env, params, build, currentBuild. Return a Map with keys matching the parameter names below.
blockBuildParamTitle=Block Build Parameter Name
blockBuildParamDescription=The parameter name in Groovy script result that determines whether to block the build (true = only show popup, do not build)
showPopupParamTitle=Show Popup Parameter Name
showPopupParamDescription=The parameter name in Groovy script result that determines whether to show popup
popupContentParamTitle=Popup Content Parameter Name
popupContentParamDescription=The parameter name in Groovy script result that contains popup message content
scriptTimeoutTitle=Script Timeout (seconds)
scriptTimeoutDescription=Maximum time allowed for Groovy script execution. Uses global configuration if not set.

enabledTitle=Enable Build Popup Check
groovyScriptTitle=Groovy Script
groovyScriptDescription=Groovy script executed before build. Bindings: job, jenkins, env, params. MUST return a Map like: return [blockBuild: true, showPopup: true, popupContent: 'message', popupTitle: 'title']. Keys: blockBuild (Boolean, default=false), showPopup (Boolean, default=false), popupContent (String), popupTitle (String, default='Build Notification'). Use map literal syntax [key: value], NOT method call.
scriptTimeoutTitle=Script Timeout (seconds)
scriptTimeoutDescription=Maximum time for Groovy script execution. Uses global configuration if not set.
